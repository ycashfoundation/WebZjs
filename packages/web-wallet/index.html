<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23f56733'/%3E%3Cpath d='M9.5 9h3.1l3.4 6.3L19.4 9h3.1l-5 9v5h-3v-5z' fill='%23ffffff'/%3E%3C/svg%3E" />
    <script>
      // Apply the saved theme before the stylesheet loads so users who
      // switched to light don't see a dark flash on reload.
      (function () {
        try {
          var saved = localStorage.getItem('yw:theme');
          document.documentElement.setAttribute(
            'data-theme',
            saved === 'light' ? 'light' : 'dark'
          );
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link href="src/styles/index.css" rel="stylesheet">
    <title>Ycash Web Wallet</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
